<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Caduceus</title>
<script>
  // SPA redirect for GitHub Pages — rewrites /path to /?p=/path
  var path = window.location.pathname;
  var repo = '/caduceus';
  if (path.startsWith(repo)) path = path.slice(repo.length);
  if (path && path !== '/') {
    window.location.replace(
      window.location.origin + repo + '/?p=' + encodeURIComponent(path)
    );
  }
</script>
</head>
<body></body>
</html>
